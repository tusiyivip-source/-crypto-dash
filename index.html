// High/Low crosshair primitive — draws dashed lines at candle high & low
class HighLowCrosshair {
  constructor() {
    this._high = null;
    this._low = null;
    this._time = null;
    this._chart = null;
    this._series = null;
    this._requestUpdate = null;
  }
  attached(param) {
    this._chart = param.chart;
    this._series = param.series;
    this._requestUpdate = param.requestUpdate;
  }
  detached() {
    this._chart = null;
    this._series = null;
    this._requestUpdate = null;
  }
  update(high, low, time) {
    this._high = high;
    this._low = low;
    this._time = time;
    if (this._requestUpdate) this._requestUpdate();
  }
  clear() {
    this._high = null;
    this._low = null;
    this._time = null;
    if (this._requestUpdate) this._requestUpdate();
  }
  // v4.1: ISeriesPrimitiveBase
  paneViews() { return [this]; }
  // v4.1: ISeriesPrimitivePaneView
  renderer() { return this; }
  // v4.1: ISeriesPrimitivePaneRenderer
  draw(target) {
    if (this._high === null || this._low === null || this._time === null) return;
    if (!this._chart || !this._series) return;
    try {
      target.useMediaCoordinateSpace((scope) => {
        const ctx = scope.context;
        const highY = this._series.priceScale().priceToCoordinate(this._high);
        const lowY = this._series.priceScale().priceToCoordinate(this._low);
        if (highY === null || lowY === null) return;
        const w = scope.mediaSize.width;

        // High line (red dashed)
        ctx.beginPath();
        ctx.setLineDash([4, 3]);
        ctx.strokeStyle = '#f6465d';
        ctx.lineWidth = 1;
        ctx.moveTo(0, highY);
        ctx.lineTo(w, highY);
        ctx.stroke();
        ctx.setLineDash([]);

        const highText = this._high.toFixed(4);
        ctx.font = 'bold 10px monospace';
        ctx.textBaseline = 'bottom';
        const hw = ctx.measureText(highText).width;
        ctx.fillStyle = '#f6465d';
        ctx.fillRect(w - hw - 10, highY - 13, hw + 8, 13);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(highText, w - hw - 6, highY - 2);

        // Low line (green dashed)
        ctx.beginPath();
        ctx.setLineDash([4, 3]);
        ctx.strokeStyle = '#0ecb81';
        ctx.lineWidth = 1;
        ctx.moveTo(0, lowY);
        ctx.lineTo(w, lowY);
        ctx.stroke();
        ctx.setLineDash([]);

        const lowText = this._low.toFixed(4);
        ctx.font = 'bold 10px monospace';
        ctx.textBaseline = 'top';
        const lw = ctx.measureText(lowText).width;
        ctx.fillStyle = '#0ecb81';
        ctx.fillRect(w - lw - 10, lowY + 2, lw + 8, 13);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(lowText, w - lw - 6, lowY + 13);
      });
    } catch(e) { console.warn('[HighLowCrosshair] draw error:', e); }
  }
}

// Fibonacci retracement primitive — draws fib level lines between two anchor points
const FIB_LEVELS = [
  { pct: 0, label: '0%', color: '#f0b90b' },
  { pct: 0.236, label: '23.6%', color: '#0ef0f0' },
  { pct: 0.5, label: '50%', color: '#eaecef' },
  { pct: 1.0, label: '100%', color: '#f0b90b' },
  { pct: 2.0, label: '200%', color: '#f6465d' },
];

class FibRetracement {
  constructor() {
    this._point1 = null; // { time, price }
    this._point2 = null;
    this._chart = null;
    this._series = null;
    this._requestUpdate = null;
  }
  attached(param) {
    this._chart = param.chart;
    this._series = param.series;
    this._requestUpdate = param.requestUpdate;
  }
  detached() {
    this._chart = null;
    this._series = null;
    this._requestUpdate = null;
  }
  setPoints(p1, p2) {
    this._point1 = p1 || null;
    this._point2 = p2 || null;
    if (this._requestUpdate) this._requestUpdate();
  }
  clear() {
    this._point1 = null;
    this._point2 = null;
    if (this._requestUpdate) this._requestUpdate();
  }
  // v4.1: ISeriesPrimitiveBase
  paneViews() { return [this]; }
  // v4.1: ISeriesPrimitivePaneView
  renderer() { return this; }
  // v4.1: ISeriesPrimitivePaneRenderer
  draw(target) {
    if (!this._chart || !this._series) return;
    try {
    target.useMediaCoordinateSpace((scope) => {
      const ctx = scope.context;
      const w = scope.mediaSize.width;
      const _toXY = (pt) => {
        if (!pt) return null;
        const x = this._chart.timeScale().timeToCoordinate(pt.time);
        const y = this._series.priceScale().priceToCoordinate(pt.price);
        return (x != null && y != null) ? { x, y } : null;
      };

      // Draw anchor point 1 (if set)
      if (this._point1) {
        const c1 = _toXY(this._point1);
        if (c1) {
          ctx.beginPath();
          ctx.arc(c1.x, c1.y, 5, 0, Math.PI * 2);
          ctx.fillStyle = '#f0b90b';
          ctx.fill();
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 1;
          ctx.stroke();
          const t1 = this._point1.price.toFixed(4);
          ctx.font = 'bold 10px monospace';
          const tw = ctx.measureText(t1).width;
          ctx.fillStyle = '#f0b90b';
          ctx.fillRect(c1.x - tw/2 - 4, c1.y - 18, tw + 8, 14);
          ctx.fillStyle = '#000';
          ctx.textBaseline = 'middle';
          ctx.fillText(t1, c1.x - tw/2, c1.y - 11);
        }
      }

      // Draw fib levels (if both points set)
      if (!this._point1 || !this._point2) return;
      const high = Math.max(this._point1.price, this._point2.price);
      const low = Math.min(this._point1.price, this._point2.price);
      const range = high - low;
      if (range <= 0) return;

      // Anchor point 2 dot
      const c2 = _toXY(this._point2);
      if (c2) {
        ctx.beginPath();
        ctx.arc(c2.x, c2.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#f0b90b';
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      FIB_LEVELS.forEach(({ pct, label, color }) => {
        const price = high - pct * range;
        const y = this._series.priceScale().priceToCoordinate(price);
        if (y === null) return;

        // Dashed line
        ctx.beginPath();
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
        ctx.setLineDash([]);

        // Label at right edge
        const text = `${label} ${price.toFixed(4)}`;
        ctx.font = 'bold 10px monospace';
        const tw = ctx.measureText(text).width;
        const lx = w - tw - 16;
        ctx.fillStyle = 'rgba(11,14,17,0.9)';
        ctx.fillRect(lx, y - 7, tw + 14, 14);
        ctx.fillStyle = color;
        ctx.fillRect(lx, y - 7, 3, 14);
        ctx.fillStyle = color;
        ctx.textBaseline = 'middle';
        ctx.fillText(text, lx + 7, y);
      });
    });
    } catch(e) { console.warn('[FibRetracement] draw error:', e); }
  }
}

// Stroke (笔) overlay primitive — draws chan theory stroke lines with markers
class StrokeOverlay {
  constructor() {
    this._strokes = [];        // confirmed stroke pivots
    this._liveTarget = null;   // unconfirmed live stroke
    this._chart = null;
    this._series = null;
    this._requestUpdate = null;
    this._editMode = false;
    this._selectedIndex = -1;
    this._onEditCallback = null;
    this._hoveredIndex = -1;
  }
  attached(param) {
    this._chart = param.chart;
    this._series = param.series;
    this._requestUpdate = param.requestUpdate;
  }
  detached() {
    this._chart = null;
    this._series = null;
    this._requestUpdate = null;
  }

  setData(strokes, liveTarget) {
    this._strokes = strokes || [];
    this._liveTarget = liveTarget || null;
    if (this._requestUpdate) this._requestUpdate();
  }

  setEditMode(on) {
    this._editMode = on;
    this._selectedIndex = -1;
    this._hoveredIndex = -1;
    if (this._requestUpdate) this._requestUpdate();
  }

  setEditCallback(cb) { this._onEditCallback = cb; }

  // Convert logical point to pixel coordinates using chart API
  _toXY(pt) {
    if (!this._chart || !this._series || !pt) return null;
    const x = this._chart.timeScale().timeToCoordinate(pt.time);
    const y = this._series.priceScale().priceToCoordinate(pt.price);
    return (x != null && y != null) ? { x, y } : null;
  }

  // Find nearest stroke point to a pixel coordinate (called from panel events)
  hitTest(x, y) {
    if (!this._chart || !this._series) return null;
    const allPts = this._getAllPoints();
    let best = null, bestDist = Infinity;
    for (let i = 0; i < allPts.length; i++) {
      const pt = allPts[i];
      const coord = this._toXY(pt);
      if (!coord) continue;
      const dx = coord.x - x;
      const dy = coord.y - y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 15 && dist < bestDist) {
        bestDist = dist;
        best = { ...pt, strokeIndex: i, coord };
      }
    }
    return best;
  }

  _getAllPoints() {
    const pts = [...this._strokes];
    if (this._liveTarget) pts.push(this._liveTarget);
    return pts;
  }

  clear() {
    this._strokes = [];
    this._liveTarget = null;
    if (this._requestUpdate) this._requestUpdate();
  }

  // v4.1: ISeriesPrimitiveBase
  paneViews() { return [this]; }
  // v4.1: ISeriesPrimitivePaneView
  renderer() { return this; }
  // v4.1: ISeriesPrimitivePaneRenderer
  draw(target) {
    if (!this._chart || !this._series) return;
    try {
    target.useMediaCoordinateSpace((scope) => {
      const ctx = scope.context;
      const allPts = this._getAllPoints();
      if (allPts.length < 2 && !this._liveTarget) return;

      const w = scope.mediaSize.width;

      // Draw confirmed stroke lines (solid)
      for (let i = 1; i < this._strokes.length; i++) {
        const p1 = this._strokes[i - 1];
        const p2 = this._strokes[i];
        const c1 = this._toXY(p1);
        const c2 = this._toXY(p2);
        if (!c1 || !c2) continue;

        const isUp = p2.price > p1.price;

        // Main stroke line
        ctx.beginPath();
        ctx.setLineDash([]);
        ctx.strokeStyle = isUp ? '#f6465d' : '#0ecb81';
        ctx.lineWidth = 2;
        ctx.moveTo(c1.x, c1.y);
        ctx.lineTo(c2.x, c2.y);
        ctx.stroke();

        // Direction arrow at midpoint
        const mx = (c1.x + c2.x) / 2;
        const my = (c2.y + c1.y) / 2 - 10;
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = isUp ? '#f6465d' : '#0ecb81';
        ctx.fillText(isUp ? '↑' : '↓', mx, my);
      }

      // Draw live/unconfirmed stroke (dashed)
      if (this._liveTarget && this._strokes.length > 0) {
        const lastConfirmed = this._strokes[this._strokes.length - 1];
        const c1 = this._toXY(lastConfirmed);
        const c2 = this._toXY(this._liveTarget);
        if (c1 && c2) {
          const isUp = this._liveTarget.price > lastConfirmed.price;
          ctx.beginPath();
          ctx.setLineDash([8, 4]);
          ctx.strokeStyle = isUp ? 'rgba(246,70,93,0.5)' : 'rgba(14,203,129,0.5)';
          ctx.lineWidth = 1.5;
          ctx.moveTo(c1.x, c1.y);
          ctx.lineTo(c2.x, c2.y);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }

      // Draw pivot markers for confirmed strokes
      for (let i = 0; i < this._strokes.length; i++) {
        const pt = this._strokes[i];
        const c = this._toXY(pt);
        if (!c) continue;

        const isSelected = this._editMode && i === this._selectedIndex;
        const isHovered = this._editMode && i === this._hoveredIndex;
        const size = isSelected ? 8 : isHovered ? 7 : 5;
        const fillColor = isSelected ? '#f0b90b' : isHovered ? '#ff9800' :
          (pt.type === 'high' ? '#f6465d' : '#0ecb81');

        // Outer glow
        if (isSelected) {
          ctx.beginPath();
          ctx.arc(c.x, c.y, size + 4, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(240,185,11,0.3)';
          ctx.fill();
        }

        // Main dot
        ctx.beginPath();
        ctx.arc(c.x, c.y, size, 0, Math.PI * 2);
        ctx.fillStyle = fillColor;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = isSelected ? 2 : 1;
        ctx.stroke();

        // Stroke number label
        const label = `${i + 1}`;
        ctx.font = 'bold 9px monospace';
        ctx.textAlign = 'center';
        const ly = pt.type === 'high' ? c.y - size - 8 : c.y + size + 14;
        ctx.fillStyle = pt.type === 'high' ? '#f6465d' : '#0ecb81';
        ctx.fillText(label, c.x, ly);

        // Price label
        const priceLabel = pt.price.toFixed(pt.price >= 100 ? 2 : pt.price >= 1 ? 4 : 6);
        ctx.font = '9px monospace';
        const tw = ctx.measureText(priceLabel).width;
        const lx = Math.min(Math.max(c.x - tw / 2, 4), w - tw - 8);
        const ly2 = pt.type === 'high' ? c.y - size - 18 : c.y + size + 24;
        ctx.fillStyle = 'rgba(11,14,17,0.85)';
        ctx.fillRect(lx - 2, ly2 - 9, tw + 4, 11);
        ctx.fillStyle = '#eaecef';
        ctx.textAlign = 'start';
        ctx.fillText(priceLabel, lx, ly2);
      }

      // Live target marker (hollow)
      if (this._liveTarget) {
        const c = this._toXY(this._liveTarget);
        if (c) {
          ctx.beginPath();
          ctx.setLineDash([3, 3]);
          ctx.arc(c.x, c.y, 5, 0, Math.PI * 2);
          ctx.strokeStyle = this._liveTarget.type === 'high' ? '#f6465d' : '#0ecb81';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }
    });
    } catch(e) { console.warn('[StrokeOverlay] draw error:', e); }
  }
}

class ChartPanel {
  constructor(symbol, container) {
    this.symbol = symbol;
    this.container = container;
    this._dataLoaded = false;
    this.chart = null;
    this.candleSeries = null;
    this.ma7Series = null;
    this.ma14Series = null;
    this.macdHistSeries = null;
    this.macdSignalSeries = null;
    this.volumeSeries = null;
    this.pairData = null;
    this.candles = [];
    this.dataValid = true;
    this.dataIssue = '';
    this._initialFitDone = false;
    this._priceLines = {}; // { alertId: PriceLine }
    this._hlCrosshair = null;  // HighLowCrosshair primitive
    this._fibPrimitive = null; // FibRetracement primitive
    this._fibPoint1 = null;    // first fib anchor
    this._strokeOverlay = null; // StrokeOverlay primitive
    this._strokeData = { strokes: [], liveTarget: null };
    this._strokeEditMode = false;
    this._strokeDragging = null; // { strokeIndex, startCoord }
  }

  create() {
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.id = `panel-${this.symbol}`;
    panel.innerHTML = `
      <div class="panel-header" title="点击展开/收起">
        <span class="panel-symbol">${this.symbol}</span>
        <span class="panel-price">--</span>
        <span class="panel-change">--</span>
        <div class="panel-actions">
          <button class="panel-btn alert-btn" title="设置价格提醒">🔔</button>
          <button class="panel-btn fib-btn" title="斐波那契回调">📐</button>
          <button class="panel-btn stroke-btn" title="缠论笔画线/编辑">✏️</button>
          <button class="panel-btn remove" title="移除">×</button>
        </div>
      </div>
      <div class="panel-alert-inline">
        <label>上方</label><input class="alert-upper" type="number" step="any" placeholder="突破价">
        <button class="alert-quick-btn upper-current">现价</button>
        <label>下方</label><input class="alert-lower" type="number" step="any" placeholder="跌破价">
        <button class="alert-quick-btn lower-current">现价</button>
        <label>备注</label><input class="alert-memo" type="text" placeholder="自定义备注">
        <button class="alert-set-btn">设置</button>
        <button class="alert-clear-btn">清除</button>
      </div>
      <div class="panel-chart" id="chart-${this.symbol}">
        <div class="loading-overlay"><div class="loading-spinner"></div></div>
      </div>
      <div class="panel-footer">
        <span class="data-status"></span>
      </div>
    `;
    this.container.appendChild(panel);
    this.panel = panel;
    this.setupEvents();
  }

  setupEvents() {
    // Remove button
    this.panel.querySelector('.remove').addEventListener('click', (e) => {
      e.stopPropagation();
      this.remove();
    });

    // Alert bell button - toggle inline alert form
    const alertBtn = this.panel.querySelector('.alert-btn');
    const alertInline = this.panel.querySelector('.panel-alert-inline');
    const upperInput = alertInline.querySelector('.alert-upper');
    const lowerInput = alertInline.querySelector('.alert-lower');
    const memoInput = alertInline.querySelector('.alert-memo');
    const curPrice = () => this.pairData ? this.pairData.lastPrice : 0;

    alertBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = alertInline.classList.toggle('show');
      if (isOpen) {
        alertBtn.classList.add('active');
        const p = curPrice();
        if (p && !upperInput.value) upperInput.value = p;
        if (p && !lowerInput.value) lowerInput.value = p;
      } else {
        alertBtn.classList.remove('active');
      }
    });

    // Quick buttons: fill current price
    alertInline.querySelector('.upper-current').addEventListener('click', (e) => {
      e.stopPropagation();
      upperInput.value = curPrice();
    });
    alertInline.querySelector('.lower-current').addEventListener('click', (e) => {
      e.stopPropagation();
      lowerInput.value = curPrice();
    });

    // Set button: create alerts
    alertInline.querySelector('.alert-set-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const upper = parseFloat(upperInput.value);
      const lower = parseFloat(lowerInput.value);
      if (isNaN(upper) && isNaN(lower)) return;
      const memo = memoInput.value.trim();
      // Remove existing alerts for this symbol
      for (const a of STATE.alerts.filter(a => a.symbol === this.symbol && !a.triggered)) {
        AlertManager.removeAlert(a.id);
      }
      if (!isNaN(upper) && upper > 0) {
        const a = AlertManager.addAlert(this.symbol, upper, 'above', memo);
        this.addPriceLine(a.id, upper);
      }
      if (!isNaN(lower) && lower > 0) {
        const a = AlertManager.addAlert(this.symbol, lower, 'below', memo);
        this.addPriceLine(a.id, lower);
      }
    });

    // Clear button: remove all alerts for this symbol
    alertInline.querySelector('.alert-clear-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      upperInput.value = '';
      lowerInput.value = '';
      for (const a of STATE.alerts.filter(a => a.symbol === this.symbol && !a.triggered)) {
        AlertManager.removeAlert(a.id);
      }
    });

    // Header click to expand/collapse
    this.panel.querySelector('.panel-header').addEventListener('click', (e) => {
      // Don't collapse when clicking fib/alert/remove buttons
      if (e.target.closest('.panel-btn')) return;
      this.panel.classList.toggle('expanded');
      if (this.chart) {
        setTimeout(() => this.chart.resize(), 300);
      }
    });

    // Fibonacci retracement button
    const fibBtn = this.panel.querySelector('.fib-btn');
    fibBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (fibBtn.classList.contains('active')) {
        // Exit fib mode
        fibBtn.classList.remove('active');
        this._fibPoint1 = null;
        if (this._fibPrimitive) this._fibPrimitive.clear();
      } else {
        // Enter fib mode
        fibBtn.classList.add('active');
        this._fibPoint1 = null;
        if (this._fibPrimitive) this._fibPrimitive.clear();
        showToast('📐 在K线图上点击两个点: 第一个点=起点, 第二个点=终点', false);
      }
    });

    // Stroke (笔) button - toggle edit mode
    const strokeBtn = this.panel.querySelector('.stroke-btn');
    strokeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      this._toggleStrokeEditMode();
    });
  }

  _toggleStrokeEditMode() {
    const strokeBtn = this.panel.querySelector('.stroke-btn');
    this._strokeEditMode = !this._strokeEditMode;
    if (this._strokeEditMode) {
      strokeBtn.classList.add('active');
      this._strokeOverlay.setEditMode(true);
      showToast('✏️ 笔画编辑模式: 点击端点拖动修改位置, 右键删除笔画', false);
    } else {
      strokeBtn.classList.remove('active');
      this._strokeOverlay.setEditMode(false);
      this._strokeDragging = null;
    }
  }

  _handleStrokeEdit(x, y, isRightClick) {
    if (!this._strokeEditMode || !this._strokeOverlay || !this.chart) return;

    if (isRightClick) {
      // Right-click: delete nearest stroke
      const hit = this._strokeOverlay.hitTest(x, y);
      if (hit && hit.strokeIndex < this._strokeData.strokes.length) {
        this._deleteStrokePoint(hit.strokeIndex);
      }
      return;
    }

    // Left-click: select or start dragging
    const hit = this._strokeOverlay.hitTest(x, y);

    if (hit && hit.strokeIndex < this._strokeData.strokes.length) {
      this._strokeDragging = {
        strokeIndex: hit.strokeIndex,
        startX: x,
        startY: y,
      };
      this._strokeOverlay._selectedIndex = hit.strokeIndex;
      this._strokeOverlay._requestUpdate && this._strokeOverlay._requestUpdate();
    }
  }

  _deleteStrokePoint(index) {
    if (index < 0 || index >= this._strokeData.strokes.length) return;
    const strokes = [...this._strokeData.strokes];
    strokes.splice(index, 1);
    this._strokeData.strokes = strokes;
    this._strokeOverlay.setData(this._strokeData.strokes, this._strokeData.liveTarget);
    this._saveStrokeLearning();
    showToast(`✏️ 已删除笔${index + 1}端点`, false);
  }

  _saveStrokeLearning() {
    try {
      const key = `stroke_learning_${this.symbol}_${STATE.currentTF}`;
      const data = {
        symbol: this.symbol,
        tf: STATE.currentTF,
        strokes: this._strokeData.strokes.map(s => ({ index: s.index, price: s.price, time: s.time, type: s.type })),
        updatedAt: Date.now(),
      };
      localStorage.setItem(key, JSON.stringify(data));
    } catch (e) {}
  }

  _loadStrokeLearning() {
    try {
      const key = `stroke_learning_${this.symbol}_${STATE.currentTF}`;
      const raw = localStorage.getItem(key);
      if (raw) {
        const data = JSON.parse(raw);
        return data.strokes || null;
      }
    } catch (e) {}
    return null;
  }

  _handleFibClick(time, price) {
    const fibBtn = this.panel.querySelector('.fib-btn');
    if (!fibBtn || !fibBtn.classList.contains('active')) return;

    if (!this._fibPoint1) {
      this._fibPoint1 = { time, price };
      this._fibPrimitive.setPoints(this._fibPoint1, null);
    } else {
      const p2 = { time, price };
      this._fibPrimitive.setPoints(this._fibPoint1, p2);
      this._fibPoint1 = null; // reset for next pair
    }
  }

  initChart() {
    const chartContainer = this.panel.querySelector(`#chart-${this.symbol}`);
    const loading = chartContainer.querySelector('.loading-overlay');

    if (typeof LightweightCharts === 'undefined') {
      loading.innerHTML = '<span style="color:#f6465d">图表库加载失败，请检查网络</span>';
      return;
    }

    this.chart = LightweightCharts.createChart(chartContainer, {
      layout: {
        background: { color: 'transparent' },
        textColor: '#848e9c',
      },
      grid: {
        vertLines: { color: 'rgba(255,255,255,0.04)' },
        horzLines: { color: 'rgba(255,255,255,0.04)' },
      },
      crosshair: {
        mode: LightweightCharts.CrosshairMode.Magnet,
        vertLine: { color: 'rgba(255,255,255,0.3)', style: 2, width: 1, labelVisible: true, labelBackgroundColor: '#f0b90b' },
        horzLine: { color: '#f0b90b', style: 1, width: 2, labelVisible: true, labelBackgroundColor: '#f0b90b', labelTextColor: '#000000' },
      },
      rightPriceScale: {
        borderColor: 'rgba(255,255,255,0.1)',
        scaleMargins: { top: 0.05, bottom: 0.2 },
        autoScale: true,
        visible: true,
      },
      timeScale: {
        borderColor: 'rgba(255,255,255,0.1)',
        timeVisible: true,
        secondsVisible: false,
        rightOffset: 2,
        barSpacing: 8,
        fixLeftEdge: false,
        lockVisibleTimeRangeOnResize: true,
        minBarSpacing: 3,
        tickMarkFormatter: (time) => {
          const d = new Date(time * 1000);
          const month = d.getMonth() + 1;
          const day = d.getDate();
          const h = String(d.getHours()).padStart(2, '0');
          const m = String(d.getMinutes()).padStart(2, '0');
          if (h === '00' && m === '00') {
            return month + '/' + day;
          }
          return h + ':' + m;
        },
      },
      handleScroll: { vertTouchDrag: false, mouseWheel: true, pressedMouseMove: true },
      handleScale: { axisPressedMouseMove: true, mouseWheel: true, pinch: true },
    });

    this.chart.subscribeCrosshairMove((param) => {
      if (!param.point || !param.time) {
        const tooltip = document.getElementById('tooltip');
        tooltip.style.display = 'none';
        if (this._hlCrosshair) this._hlCrosshair.clear();
        return;
      }
      const data = param.seriesData.get(this.candleSeries);
      if (data) {
        const tooltip = document.getElementById('tooltip');
        tooltip.style.display = 'block';
        tooltip.style.left = (param.point.x + 15) + 'px';
        tooltip.style.top = (param.point.y - 80) + 'px';
        const d = new Date(param.time * 1000);
        const ts = d.getFullYear() + '-' +
          String(d.getMonth() + 1).padStart(2, '0') + '-' +
          String(d.getDate()).padStart(2, '0') + ' ' +
          String(d.getHours()).padStart(2, '0') + ':' +
          String(d.getMinutes()).padStart(2, '0');
        tooltip.innerHTML = `
          <b>${this.symbol}</b><br>
          O: ${fmtPrice(data.open)} H: ${fmtPrice(data.high)}<br>
          L: ${fmtPrice(data.low)} C: ${fmtPrice(data.close)}<br>
          <span style="color:var(--text-secondary);font-size:10px">${ts} BJT</span>
        `;
        if (this._hlCrosshair) this._hlCrosshair.update(data.high, data.low, param.time);
      }
    });

    // Candlestick series
    this.candleSeries = this.chart.addCandlestickSeries({
      upColor: '#f6465d', downColor: '#0ecb81',
      borderUpColor: '#f6465d', borderDownColor: '#0ecb81',
      wickUpColor: '#f6465d', wickDownColor: '#0ecb81',
      lastValueVisible: true,
      priceLineVisible: false,
    });

    // High/Low crosshair overlay
    this._hlCrosshair = new HighLowCrosshair();
    this.candleSeries.attachPrimitive(this._hlCrosshair);

    // Fibonacci retracement overlay
    this._fibPrimitive = new FibRetracement();
    this.candleSeries.attachPrimitive(this._fibPrimitive);
    // Fib click handler — DOM event on chart container, converts x→time→candle
    chartContainer.addEventListener('click', (e) => {
      if (e.button !== 0) return; // left-click only
      const fibBtn = this.panel.querySelector('.fib-btn');
      if (!fibBtn || !fibBtn.classList.contains('active')) return;
      const rect = chartContainer.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const time = this.chart.timeScale().coordinateToTime(x);
      if (time == null) return;
      // Find closest candle
      let best = null, bestDist = Infinity;
      for (const c of this.candles) {
        const dist = Math.abs(c.time - time);
        if (dist < bestDist) { bestDist = dist; best = c; }
      }
      if (best && best.close != null) {
        this._handleFibClick(best.time, best.close);
      }
    });

    // Stroke (笔) overlay
    this._strokeOverlay = new StrokeOverlay();
    this.candleSeries.attachPrimitive(this._strokeOverlay);

    // Stroke edit click handler
    chartContainer.addEventListener('click', (e) => {
      if (e.button !== 0) return; // left-click only
      const strokeBtn = this.panel.querySelector('.stroke-btn');
      if (!strokeBtn || !strokeBtn.classList.contains('active')) return;
      if (this._fibPoint1 !== null && document.querySelector('.fib-btn.active')) return; // fib active
      const rect = chartContainer.getBoundingClientRect();
      const x = e.clientX - rect.left;
      this._handleStrokeEdit(x, e.clientY - rect.top, false);
    });

    // Stroke right-click delete
    chartContainer.addEventListener('contextmenu', (e) => {
      const strokeBtn = this.panel.querySelector('.stroke-btn');
      if (!strokeBtn || !strokeBtn.classList.contains('active')) return;
      e.preventDefault();
      e.stopPropagation();
      const rect = chartContainer.getBoundingClientRect();
      this._handleStrokeEdit(e.clientX - rect.left, e.clientY - rect.top, true);
    });

    // Stroke drag handling
    let dragCleanup = () => {};
    chartContainer.addEventListener('mousemove', (e) => {
      if (!this._strokeEditMode || !this._strokeDragging || !this._strokeOverlay) return;
      const rect = chartContainer.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const timeScale = this.chart.timeScale();
      const priceScale = this.chart.priceScale('');

      const newTime = timeScale.coordinateToTime(x);
      const newPrice = priceScale.coordinateToPrice(y);

      if (newTime != null && newPrice != null && !isNaN(newPrice)) {
        // Find nearest candle
        let best = this.candles[0], bestDist = Infinity;
        for (const c of this.candles) {
          const d = Math.abs(c.time - newTime);
          if (d < bestDist) { bestDist = d; best = c; }
        }
        const idx = this._strokeDragging.strokeIndex;
        const corrected = ChanTheory.applyCorrection(
          this._strokeData.strokes, idx,
          { time: best.time, price: newPrice, type: this._strokeData.strokes[idx].type },
          this.candles
        );
        this._strokeData.strokes = corrected;
        this._strokeOverlay._selectedIndex = idx;
        if (this._strokeOverlay._requestUpdate) this._strokeOverlay._requestUpdate();
      }
    });

    chartContainer.addEventListener('mouseup', () => {
      if (this._strokeDragging) {
        this._strokeData.strokes = [...this._strokeData.strokes]; // trigger reactivity
        this._strokeOverlay.setData(this._strokeData.strokes, this._strokeData.liveTarget);
        this._saveStrokeLearning();
        this._strokeDragging = null;
        this._strokeOverlay._selectedIndex = -1;
        if (this._strokeOverlay._requestUpdate) this._strokeOverlay._requestUpdate();
        showToast('✏️ 笔画已更新并记录', false);
      }
    });

    // Keyboard: Escape to exit stroke edit mode
    const escHandler = (e) => {
      if (e.key === 'Escape' && this._strokeEditMode) {
        this._toggleStrokeEditMode();
      }
    };
    document.addEventListener('keydown', escHandler);
    this._escHandler = escHandler;

    // MA series
    this.ma7Series = this.chart.addLineSeries({
      color: '#f0b90b', lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
    });
    this.ma14Series = this.chart.addLineSeries({
      color: '#e040fb', lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
    });

    // MACD series (creates 'macd' price scale)
    this.macdHistSeries = this.chart.addHistogramSeries({
      color: '#f6465d', priceFormat: { type: 'price', precision: 8 },
      priceScaleId: 'macd', priceLineVisible: false, lastValueVisible: false,
    });
    this.macdSignalSeries = this.chart.addLineSeries({
      color: '#f6465d', lineWidth: 1,
      priceScaleId: 'macd', priceLineVisible: false, lastValueVisible: false,
    });

    // Volume histogram (bottom of chart)
    this.volumeSeries = this.chart.addHistogramSeries({
      color: 'rgba(255,255,255,0.15)',
      priceFormat: { type: 'volume' },
      priceScaleId: 'volume',
      priceLineVisible: false, lastValueVisible: false,
    });

    // Configure MACD scale (after series are added)
    this.chart.priceScale('macd').applyOptions({
      scaleMargins: { top: 0.75, bottom: 0.05 },
      visible: true,
    });

    // Configure Volume scale
    this.chart.priceScale('volume').applyOptions({
      scaleMargins: { top: 0.85, bottom: 0.0 },
      visible: false,
    });

    // Right-click on chart to set alert
    // Use capture phase on container so we get the event before LightweightCharts canvas intercepts it
    chartContainer.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const rect = chartContainer.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const priceScale = this.chart.priceScale('');
      const price = priceScale.coordinateToPrice(y);
      if (price != null && !isNaN(price)) {
        this._showAlertMenu(e.clientX, e.clientY, price);
      }
    }, true);  // capture phase
  }

  async loadData() {
    if (!this.chart) return;

    // Phase 1: Load main timeframe immediately for fast display
    try {
      const candles = await BinanceAPI.getKlines(this.symbol, STATE.currentTF, CONFIG.KLINE_LIMIT);
      this.candles = candles;

      const validation = Indicators.validateData(candles);
      this.dataValid = validation.valid;
      this.dataIssue = validation.reason || '';
      if (!this.dataValid) this.panel.classList.add('warning');
      else this.panel.classList.remove('warning');

      this.updateChart();
      this.updateStatus();
    } catch (e) {
      this.dataValid = false;
      this.dataIssue = '加载失败';
      this.panel.classList.add('error');
      this.updateStatus();
    }

    // Remove loading spinner
    const loading = this.panel.querySelector('.loading-overlay');
    if (loading) loading.remove();
    this._dataLoaded = true;
  }

  updateChart() {
    if (!this.chart || !this.candles.length) return;

    // Update candlesticks
    const candleData = this.candles.map(c => ({
      time: c.time, open: c.open, high: c.high, low: c.low, close: c.close,
    }));
    this.candleSeries.setData(candleData);

    // Calculate indicators
    const ma7 = Indicators.sma(this.candles, CONFIG.MA_PERIODS[0]);
    const ma14 = Indicators.sma(this.candles, CONFIG.MA_PERIODS[1]);
    const macd = Indicators.macd(this.candles);

    // Update MA lines
    const ma7Data = [];
    const ma14Data = [];
    for (let i = 0; i < this.candles.length; i++) {
      if (ma7[i] != null) ma7Data.push({ time: this.candles[i].time, value: ma7[i] });
      if (ma14[i] != null) ma14Data.push({ time: this.candles[i].time, value: ma14[i] });
    }
    this.ma7Series.setData(ma7Data);
    this.ma14Series.setData(ma14Data);

    // Update MACD
    const macdHistData = [];
    const macdSigData = [];
    for (let i = 0; i < this.candles.length; i++) {
      if (macd.histogram[i] != null) {
        macdHistData.push({
          time: this.candles[i].time,
          value: macd.histogram[i],
          color: macd.histogram[i] >= 0 ? '#f6465d' : '#0ecb81',
        });
      }
      if (macd.signalLine[i] != null) {
        macdSigData.push({ time: this.candles[i].time, value: macd.signalLine[i] });
      }
    }
    this.macdHistSeries.setData(macdHistData);
    this.macdSignalSeries.setData(macdSigData);

    // Volume data
    const volumeData = this.candles.map(c => ({
      time: c.time,
      value: c.volume,
      color: c.close >= c.open ? 'rgba(246,70,93,0.2)' : 'rgba(14,203,129,0.2)',
    }));
    this.volumeSeries.setData(volumeData);

    // Calculate Chan Theory strokes (笔)
    this._updateStrokes();

    // Redraw alert price lines
    this.redrawAlertLines();

    // First load: show last ~80 candles for good context
    if (!this._initialFitDone) {
      const total = this.candles.length;
      const showCount = Math.min(80, total);
      const fromTime = this.candles[total - showCount].time;
      const toTime = this.candles[total - 1].time;
      const padding = (toTime - fromTime) * 0.05;
      this.chart.timeScale().setVisibleRange({ from: fromTime - padding, to: toTime + padding });
      this._initialFitDone = true;
    }
  }

  _updateStrokes() {
    if (!this._strokeOverlay || !this.candles.length) return;

    let strokes = [], liveTarget = null;
    let usedLearned = false;

    // Try loading user-learned strokes first, validate freshness
    const learned = this._loadStrokeLearning();
    if (learned && learned.length >= 2) {
      const intervalSec = (this.candles[this.candles.length - 1].time - this.candles[0].time) / this.candles.length;
      const maxTimeDiff = intervalSec * 2; // allow 2 candles of drift
      const mapped = [];
      let allClose = true;
      for (const ls of learned) {
        let bestIdx = 0, bestDist = Infinity;
        for (let i = 0; i < this.candles.length; i++) {
          const d = Math.abs(this.candles[i].time - ls.time);
          if (d < bestDist) { bestDist = d; bestIdx = i; }
        }
        if (bestDist > maxTimeDiff) { allClose = false; break; }
        const candle = this.candles[bestIdx];
        // Preserve user-adjusted price from saved learning data
        const price = (ls.price != null && !isNaN(ls.price)) ? ls.price
          : (ls.type === 'high' ? candle.high : candle.low);
        mapped.push({ ...ls, index: bestIdx, time: candle.time, price });
      }
      if (allClose) {
        strokes = mapped;
        usedLearned = true;
      }
    }

    if (!usedLearned) {
      // Calculate fresh strokes
      const result = ChanTheory.buildStrokes(this.candles);
      strokes = result.strokes;
      liveTarget = result.liveTarget;
    }

    this._strokeData.strokes = strokes;
    this._strokeData.liveTarget = liveTarget;
    this._strokeOverlay.setData(strokes, liveTarget);
  }

  updatePrice(price, change) {
    const priceEl = this.panel.querySelector('.panel-price');
    const changeEl = this.panel.querySelector('.panel-change');
    priceEl.textContent = '$' + fmtPrice(price);
    changeEl.textContent = fmtPct(change);
    changeEl.className = 'panel-change ' + (change >= 0 ? 'up' : 'down');
  }

  updateStatus() {
    const dataStatus = this.panel.querySelector('.data-status');
    if (this.dataValid) {
      dataStatus.textContent = '✓ 数据正常';
      dataStatus.style.color = 'var(--green)';
    } else {
      dataStatus.textContent = '✗ ' + (this.dataIssue || '异常');
      dataStatus.style.color = 'var(--red)';
    }
  }

  // Update latest candle from WebSocket
  updateFromWS(kline) {
    if (!this.candles.length) return;

    const c = parseFloat(kline.c);

    // 实时更新面板价格（不刷新图表）
    const priceEl = this.panel.querySelector('.panel-price');
    const changeEl = this.panel.querySelector('.panel-change');
    priceEl.textContent = '$' + fmtPrice(c);
    if (this.pairData) {
      const chgPct = (c - this.pairData.lastPrice) / this.pairData.lastPrice * 100 + this.pairData.priceChangePercent;
      changeEl.textContent = fmtPct(chgPct);
      changeEl.className = 'panel-change ' + (chgPct >= 0 ? 'up' : 'down');
    }

    // 更新时间戳（UTC）
    const dataStatus = this.panel.querySelector('.data-status');
    if (dataStatus) {
      const now = new Date();
      const ts = String(now.getUTCHours()).padStart(2,'0') + ':' + String(now.getUTCMinutes()).padStart(2,'0') + ':' + String(now.getUTCSeconds()).padStart(2,'0');
      dataStatus.textContent = '✓ 实时 ' + ts + ' UTC';
      dataStatus.style.color = 'var(--green)';
    }

    // Check alerts against current close price
    AlertManager.checkAlerts(this.symbol, c);
  }

  remove() {
    STATE.removedPairs.add(this.symbol);
    if (this.chart) {
      this.chart.remove();
      this.chart = null;
    }
    if (this.panel && this.panel.parentNode) {
      this.panel.remove();
    }
    delete STATE.chartPanels[this.symbol];
    // Trigger addition of next pair
    dashboard.fillMissingPairs();
  }

  destroy() {
    if (this._escHandler) {
      document.removeEventListener('keydown', this._escHandler);
      this._escHandler = null;
    }
    if (this.chart) {
      this.chart.remove();
      this.chart = null;
    }
    if (this.panel && this.panel.parentNode) {
      this.panel.remove();
    }
  }

  _showAlertMenu(x, y, price) {
    STATE.alertMenuTarget = { symbol: this.symbol };
    document.getElementById('alertMenuPrice').value = fmtPrice(price);
    const menu = document.getElementById('alertMenu');
    menu.style.display = 'block';
    menu.style.left = Math.min(x, window.innerWidth - 210) + 'px';
    menu.style.top = Math.min(y, window.innerHeight - 180) + 'px';
  }

  addPriceLine(alertId, price) {
    if (!this.candleSeries) return;
    this.removePriceLine(alertId);
    const line = this.candleSeries.createPriceLine({
      price: price,
      color: '#f0b90b',
      lineWidth: 1,
      lineStyle: 2,
      axisLabelVisible: true,
      title: alertId,
    });
    this._priceLines[alertId] = line;
  }

  removePriceLine(alertId) {
    if (this._priceLines[alertId]) {
      try { this.candleSeries.removePriceLine(this._priceLines[alertId]); } catch(e) {}
      delete this._priceLines[alertId];
    }
  }

  redrawAlertLines() {
    // Remove all existing
    for (const id of Object.keys(this._priceLines)) {
      this.removePriceLine(id);
    }
    // Redraw active alerts for this symbol
    const alerts = AlertManager.getAlertsForSymbol(this.symbol);
    for (const alert of alerts) {
      this.addPriceLine(alert.id, alert.price);
    }
  }
}

// ==================== DINGTALK NOTIFICATION ====================
const DingTalk = {
  // Post via /proxy/dingtalk (handled by Python server locally, Service Worker on GitHub Pages)
  async _post(targetUrl, body, resultEl) {
    try {
      const resp = await fetch('/proxy/dingtalk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: targetUrl, body }),
      });
      const data = await resp.json();
      if (resp.ok) return data;
      if (resultEl) {
        resultEl.style.display = 'block';
        resultEl.style.color = 'var(--red)';
        resultEl.textContent = `✗ ${data.errmsg || data.error || '请求失败'}`;
      }
      return null;
    } catch (e) {
      console.error('[钉钉] 发送失败:', e.message);
      if (resultEl) {
        resultEl.style.display = 'block';
        resultEl.style.color = 'var(--red)';
        resultEl.textContent = '✗ 请启动 server.py 或刷新页面重载 Service Worker';
      }
      showToast('钉钉发送失败', false);
      return null;
    }
  },

  async sendAlert(symbol, price, direction, currentPrice, memo = '') {
    const webhook = STATE.dingtalkWebhook;
    if (!webhook) return;
    let url = webhook;
    if (STATE.dingtalkSecret) {
      const timestamp = Date.now();
      const sign = await this._generateSign(timestamp, STATE.dingtalkSecret);
      url += (webhook.includes('?') ? '&' : '?') + `timestamp=${timestamp}&sign=${encodeURIComponent(sign)}`;
    }
    const dirText = direction === 'above' ? '突破上方' : direction === 'below' ? '跌破下方' : '触碰';
    const emoji = direction === 'above' ? '📈' : direction === 'below' ? '📉' : '↕️';
    const keyword = STATE.dingtalkKeyword || '告警';
    const memoLine = memo ? `\n\n**备注**: ${memo}` : '';
    const body = JSON.stringify({
      msgtype: 'markdown',
      markdown: {
        title: `${keyword} ${symbol}`,
        text: `## ${emoji} ${keyword}触发\n\n**币种**: ${symbol}\n\n**告警价**: $${fmtPrice(price)}\n\n**当前价**: $${fmtPrice(currentPrice)}\n\n**方向**: ${dirText}${memoLine}\n\n**时间**: ${new Date().toLocaleString('zh-CN')}`,
      },
    });
    await this._post(url, body);
  },

  async sendTest(webhook, secret, keyword, resultEl) {
    if (!webhook) { resultEl.style.display='block'; resultEl.style.color='var(--red)'; resultEl.textContent='✗ 请先填写 Webhook URL'; return; }
    let url = webhook;
    if (secret) {
      const timestamp = Date.now();
      const sign = await this._generateSign(timestamp, secret);
      url += (webhook.includes('?') ? '&' : '?') + `timestamp=${timestamp}&sign=${encodeURIComponent(sign)}`;
    }
    const keyword2 = keyword || '告警';
    const body = JSON.stringify({
      msgtype: 'markdown',
      markdown: { title: `${keyword2} 测试`, text: `## 🧪 ${keyword2}测试\n\n**${keyword2}**: 牛牛盯盘系统连接成功！\n\n时间: ${new Date().toLocaleString('zh-CN')}` },
    });
    const data = await this._post(url, body, resultEl);
    if (!data) return; // _post already shows error
    resultEl.style.display = 'block';
    if (data.errcode === 0) {
      resultEl.style.color = 'var(--green)'; resultEl.textContent = '✓ 测试成功！请查看钉钉群消息';
    } else {
      resultEl.style.color = 'var(--red)'; resultEl.textContent = `✗ 失败: ${data.errmsg} (code: ${data.errcode})`;
    }
  },

  async _generateSign(timestamp, secret) {
    const encoder = new TextEncoder();
    const key = await crypto.subtle.importKey('raw', encoder.encode(secret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
    const sig = await crypto.subtle.sign('HMAC', key, encoder.encode(timestamp + '\n' + secret));
    return btoa(String.fromCharCode(...new Uint8Array(sig)));
  },
};

// ==================== ALERT MANAGER ====================
const AlertManager = {
  _idCounter: Date.now(),

  addAlert(symbol, price, direction, memo = '') {
    const id = 'alert_' + (this._idCounter++);
    const alert = { id, symbol, price, direction, memo, triggered: false, createdAt: Date.now() };
    STATE.alerts.push(alert);
    console.log(`[告警添加] ${symbol} ${direction} @ ${price} ${memo ? '备注:' + memo : ''}`);
    this._saveAlerts();
    this._updateUI();
    // Immediately check if alert should trigger
    const panel = STATE.chartPanels[symbol];
    if (panel && panel.candles.length > 0) {
      const currentPrice = panel.candles[panel.candles.length - 1].close;
      this.checkAlerts(symbol, currentPrice);
    }
    return alert;
  },

  removeAlert(id) {
    const panel = STATE.chartPanels[STATE.alerts.find(a => a.id === id)?.symbol];
    if (panel) panel.removePriceLine(id);
    STATE.alerts = STATE.alerts.filter(a => a.id !== id);
    this._saveAlerts();
    this._updateUI();
  },

  getAlertsForSymbol(symbol) {
    return STATE.alerts.filter(a => a.symbol === symbol && !a.triggered);
  },

  checkAlerts(symbol, currentPrice) {
    const alerts = STATE.alerts.filter(a => a.symbol === symbol && !a.triggered);
    for (const alert of alerts) {
      let triggered = false;
      if (alert.direction === 'above' && currentPrice >= alert.price) triggered = true;
      else if (alert.direction === 'below' && currentPrice <= alert.price) triggered = true;
      else if (alert.direction === 'cross') {
        // Cross: check if price crossed the level
        if ((currentPrice >= alert.price && (alert._lastPrice || 0) < alert.price) ||
            (currentPrice <= alert.price && (alert._lastPrice || Infinity) > alert.price)) {
          triggered = true;
        }
      }
      if (triggered) {
        alert.triggered = true;
        alert._triggeredAt = currentPrice;
        const dirText = alert.direction === 'above' ? '突破上方' : alert.direction === 'below' ? '跌破下方' : '触碰';
        console.log(`[告警触发] ${symbol} ${dirText} 告警价:${alert.price} 当前价:${currentPrice}`);
        showToast(`${symbol} ${dirText} $${fmtPrice(alert.price)} → $${fmtPrice(currentPrice)}`, true);
        DingTalk.sendAlert(symbol, alert.price, alert.direction, currentPrice, alert.memo);
        // Save to history
        this._addHistory(symbol, alert.price, alert.direction, currentPrice, alert.memo);
        // Remove price line from chart
        const panel = STATE.chartPanels[symbol];
        if (panel) panel.removePriceLine(alert.id);
      }
      alert._lastPrice = currentPrice;
    }
    // Clean triggered alerts older than 5 minutes
    const now = Date.now();
    STATE.alerts = STATE.alerts.filter(a => !a.triggered || (now - a.createdAt) < 300000);
    this._saveAlerts();
    this._updateUI();
  },

  getActiveCount() {
    return STATE.alerts.filter(a => !a.triggered).length;
  },

  _saveAlerts() {
    try {
      const saveable = STATE.alerts.filter(a => !a.triggered).map(a => ({
        id: a.id, symbol: a.symbol, price: a.price, direction: a.direction, memo: a.memo || '', createdAt: a.createdAt,
      }));
      localStorage.setItem('alerts', JSON.stringify(saveable));
    } catch(e) {}
  },

  _loadAlerts() {
    try {
      const data = JSON.parse(localStorage.getItem('alerts') || '[]');
      STATE.alerts = data.map(a => ({ ...a, triggered: false }));
    } catch(e) { STATE.alerts = []; }
  },

  _updateUI() {
    const count = this.getActiveCount();
    const el = document.getElementById('statAlerts');
    if (el) el.textContent = count;
    const btn = document.getElementById('alertConfigBtn');
    if (btn) { btn.classList.toggle('has-alerts', count > 0); btn.textContent = count > 0 ? `🔔${count}` : '🔔'; }
    this._renderPanel();
  },

  _renderPanel() {
    const panel = document.getElementById('activeAlertsPanel');
    const body = document.getElementById('alertsBody');
    const countEl = document.getElementById('alertsCount');
    if (!panel || !body) return;
    const active = STATE.alerts.filter(a => !a.triggered);
    // Show/hide panel
    panel.style.display = active.length > 0 ? 'flex' : 'none';
    if (countEl) countEl.textContent = active.length;
    if (active.length === 0) {
      body.innerHTML = '<div class="alerts-empty">暂无活跃警报</div>';
      return;
    }
    body.innerHTML = active.map(a => {
      const dirLabel = a.direction === 'above' ? '↑突破' : a.direction === 'below' ? '↓跌破' : '↕触碰';
      return `<div class="alerts-item clickable" data-symbol="${a.symbol}">
        <span class="alerts-dir ${a.direction}">${dirLabel}</span>
        <span class="alerts-info">
          <span class="alerts-symbol">${a.symbol}</span>
          <span class="alerts-meta"> @ ${fmtPrice(a.price)}${a.memo ? ' · ' + a.memo : ''}</span>
        </span>
        <button class="alerts-delete" data-id="${a.id}" title="删除">✕</button>
      </div>`;
    }).join('');
    // Bind click to jump to chart
    body.querySelectorAll('.alerts-item.clickable').forEach(item => {
      item.addEventListener('click', () => {
        const sym = item.dataset.symbol;
        const panel = STATE.chartPanels[sym];
        if (panel && panel.panel) {
          // Scroll panel into view
          panel.panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
          // Flash highlight
          panel.panel.classList.remove('panel-flash');
          void panel.panel.offsetWidth; // reflow
          panel.panel.classList.add('panel-flash');
        }
      });
    });
    // Bind delete buttons
    body.querySelectorAll('.alerts-delete').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        AlertManager.removeAlert(btn.dataset.id);
      });
    });
  },

  _addHistory(symbol, price, direction, triggeredPrice, memo) {
    const entry = {
      symbol, price, direction, triggeredPrice, memo,
      time: Date.now(),
    };
    STATE.alertHistory.unshift(entry);
    if (STATE.alertHistory.length > 200) STATE.alertHistory.length = 200;
    this._saveHistory();
  },

  _saveHistory() {
    try { localStorage.setItem('alert_history', JSON.stringify(STATE.alertHistory)); } catch(e) {}
  },

  _loadHistory() {
    try { STATE.alertHistory = JSON.parse(localStorage.getItem('alert_history') || '[]'); } catch(e) { STATE.alertHistory = []; }
  },

  renderHistory() {
    const list = document.getElementById('alertHistoryList');
    if (!list) return;
    if (STATE.alertHistory.length === 0) {
      list.innerHTML = '<div style="color:var(--text-secondary);text-align:center;padding:20px">暂无记录</div>';
      return;
    }
    list.innerHTML = STATE.alertHistory.map(h => {
      const dirIcon = h.direction === 'above' ? '📈' : h.direction === 'below' ? '📉' : '↕️';
      const dirText = h.direction === 'above' ? '突破上方' : h.direction === 'below' ? '跌破下方' : '触碰';
      const d = new Date(h.time);
      const ts = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' +
        String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
      return `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px">
        <span style="color:var(--text-secondary)">${ts}</span>
        ${dirIcon} <b>${h.symbol}</b> ${dirText}
        <span style="color:var(--yellow)">$${fmtPrice(h.price)}</span>
        → <span style="color:${h.direction === 'above' ? 'var(--green)' : 'var(--red)'}">$${fmtPrice(h.triggeredPrice)}</span>
        ${h.memo ? '<br><span style="color:var(--text-secondary);font-size:11px">📝 ' + h.memo + '</span>' : ''}
      </div>`;
    }).join('');
  },
};

// ==================== DASHBOARD CONTROLLER ====================
class Dashboard {
  constructor() {
    this.grid = document.getElementById('chartGrid');
  }

  async init() {
    this.startClock();
    this.setupTimeframeButtons();
    this.setupKeyboardShortcuts();
    this.setupManualRefresh();
    this.setupAlertMenu();
    this.setupDingTalkConfig();
    this.setupAlertHistory();
    AlertManager._loadAlerts();
    AlertManager._loadHistory();
    AlertManager._updateUI();
    updateConnectionStatus();
    await this.loadPairs();
  }

  setupTimeframeButtons() {
    const buttons = document.querySelectorAll('.tf-btn');
    buttons.forEach(btn => {
      btn.addEventListener('click', async () => {
        if (btn.dataset.tf === STATE.currentTF) return;
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        STATE.currentTF = btn.dataset.tf;
        await this.switchTimeframe();
      });
    });
  }

  setupKeyboardShortcuts() {
    document.addEventListener('keydown', (e) => {
      const tfKeys = {
        '1': '3m', '2': '5m', '3': '10m', '4': '15m', '5': '30m',
        '6': '1h', '7': '2h', '8': '3h', '9': '6h', '0': '1d',
      };
      if (tfKeys[e.key] && !e.ctrlKey && !e.metaKey) {
        const btns = document.querySelectorAll('.tf-btn');
        btns.forEach(b => b.classList.remove('active'));
        const target = document.querySelector(`[data-tf="${tfKeys[e.key]}"]`);
        if (target) {
          target.classList.add('active');
          STATE.currentTF = tfKeys[e.key];
          this.switchTimeframe();
        }
      }
    });
  }

  async loadPairs() {
    document.getElementById('statData').textContent = '加载中...';
    try {
      const pairs = await BinanceAPI.getTopPairs(CONFIG.TOP_COINS);
      STATE.pairs = pairs;
      document.getElementById('pairCount').textContent = `币种: ${pairs.length}/${CONFIG.TOP_COINS}`;

      // Create panels for all pairs (API throttled internally)
      for (const pair of pairs) {
        if (STATE.removedPairs.has(pair.symbol)) continue;
        await this.addPanel(pair);
      }

      // Subscribe to WebSocket for real-time updates
      this.connectAllWS();

      // Update stats
      this.updateStats();
      document.getElementById('statData').textContent = '✓ 数据就绪';
      document.getElementById('statData').style.color = 'var(--green)';
    } catch (e) {
      console.error('Failed to load pairs:', e);
      document.getElementById('statData').textContent = '✗ 加载失败';
      document.getElementById('statData').style.color = 'var(--red)';
    }
  }

  async addPanel(pair) {
    const panel = new ChartPanel(pair.symbol, this.grid);
    panel.create();
    panel.initChart();
    panel.updatePrice(pair.lastPrice, pair.priceChangePercent);
    STATE.chartPanels[pair.symbol] = panel;

    // Lazy load: only fetch data when panel is near viewport
    this._observePanel(panel);
  }

  _observePanel(panel) {
    if (!this._panelObserver) {
      this._panelObserver = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            const p = entry.target._chartPanel;
            if (p && !p._dataLoaded) {
              p._dataLoaded = true;
              p.loadData();
            }
            this._panelObserver.unobserve(entry.target);
          }
        }
      }, { rootMargin: '600px' }); // preload 600px ahead
    }
    panel.panel._chartPanel = panel;
    this._panelObserver.observe(panel.panel);
    // Fallback: load if not loaded after 3 seconds
    setTimeout(() => {
      if (!panel._dataLoaded) {
        panel._dataLoaded = true;
        panel.loadData();
      }
    }, 3000);
  }

  async fillMissingPairs() {
    const currentCount = Object.keys(STATE.chartPanels).length;
    if (currentCount >= CONFIG.TOP_COINS) return;

    try {
      const allPairs = await BinanceAPI.getTopPairs(CONFIG.TOP_COINS + 20);
      for (const pair of allPairs) {
        if (Object.keys(STATE.chartPanels).length >= CONFIG.TOP_COINS) break;
        if (STATE.removedPairs.has(pair.symbol)) continue;
        if (STATE.chartPanels[pair.symbol]) continue;
        await this.addPanel(pair);
      }
      document.getElementById('pairCount').textContent =
        `币种: ${Object.keys(STATE.chartPanels).length}/${CONFIG.TOP_COINS}`;
    } catch (e) {
      console.error('Fill missing pairs error:', e);
    }
  }

  connectAllWS() {
    const symbols = Object.keys(STATE.chartPanels);
    // Cap WebSocket streams to avoid overwhelming the connection
    const capped = symbols.slice(0, CONFIG.MAX_WS_STREAMS);
    BinanceAPI.connectWebSocket(capped, STATE.currentTF, (kline) => {
      const symbol = kline.s;
      const panel = STATE.chartPanels[symbol];
      if (panel) {
        panel.updateFromWS(kline.k);
      }
    });
  }

  async switchTimeframe() {
    document.getElementById('statData').textContent = '切换周期...';
    document.getElementById('statData').style.color = 'var(--yellow)';

    // Force-load all panels for new timeframe
    const panels = Object.values(STATE.chartPanels);
    panels.forEach(p => { p._initialFitDone = false; p._dataLoaded = true; });
    const promises = panels.map(async (panel, i) => {
      await sleep(i * 30);
      await panel.loadData();
    });
    await Promise.all(promises);

    // Reconnect WebSocket
    this.connectAllWS();
    this.updateStats();

    document.getElementById('statData').textContent = '✓ 数据就绪';
    document.getElementById('statData').style.color = 'var(--green)';
  }

  setupManualRefresh() {
    const btn = document.getElementById('manualRefreshBtn');
    btn.addEventListener('click', () => this.manualRefresh());
  }

  setupAlertMenu() {
    const menu = document.getElementById('alertMenu');
    const priceInput = document.getElementById('alertMenuPrice');
    // Handle alert menu clicks
    menu.querySelectorAll('.alert-menu-item').forEach(item => {
      item.addEventListener('click', () => {
        const dir = item.dataset.dir;
        const target = STATE.alertMenuTarget;
        menu.style.display = 'none';
        if (!dir || !target) return;
        // Read price from input (user may have edited it)
        const price = parseFloat(priceInput.value);
        if (isNaN(price) || price <= 0) return;
        // Add alert
        const alert = AlertManager.addAlert(target.symbol, price, dir);
        // Draw price line on chart
        const panel = STATE.chartPanels[target.symbol];
        if (panel) panel.addPriceLine(alert.id, price);
      });
    });
    // Close menu on click outside
    document.addEventListener('click', (e) => {
      if (!menu.contains(e.target)) menu.style.display = 'none';
    });
  }

  setupDingTalkConfig() {
    const modal = document.getElementById('alertConfigModal');
    const webhookInput = document.getElementById('dingtalkWebhook');
    const secretInput = document.getElementById('dingtalkSecret');
    const keywordInput = document.getElementById('dingtalkKeyword');
    const testBtn = document.getElementById('alertConfigTest');
    const testResult = document.getElementById('testResult');
    // Load saved values
    webhookInput.value = STATE.dingtalkWebhook;
    secretInput.value = STATE.dingtalkSecret;
    keywordInput.value = STATE.dingtalkKeyword;
    // Open modal
    document.getElementById('alertConfigBtn').addEventListener('click', () => {
      modal.style.display = 'flex';
      webhookInput.value = STATE.dingtalkWebhook;
      secretInput.value = STATE.dingtalkSecret;
      keywordInput.value = STATE.dingtalkKeyword;
    });
    // Save
    document.getElementById('alertConfigSave').addEventListener('click', () => {
      STATE.dingtalkWebhook = webhookInput.value.trim();
      STATE.dingtalkSecret = secretInput.value.trim();
      STATE.dingtalkKeyword = keywordInput.value.trim() || '告警';
      localStorage.setItem('dingtalk_webhook', STATE.dingtalkWebhook);
      localStorage.setItem('dingtalk_secret', STATE.dingtalkSecret);
      localStorage.setItem('dingtalk_keyword', STATE.dingtalkKeyword);
      modal.style.display = 'none';
    });
    // Test
    testBtn.addEventListener('click', async () => {
      testBtn.textContent = '⏳ 发送中...';
      testBtn.disabled = true;
      testResult.style.display = 'none';
      try {
        const kw = keywordInput.value.trim() || '告警';
        await DingTalk.sendTest(webhookInput.value.trim(), secretInput.value.trim(), kw, testResult);
      } catch(e) {
        testResult.style.display = 'block';
        testResult.style.color = 'var(--red)';
        testResult.textContent = '✗ 发送失败: ' + e.message;
      }
      testBtn.textContent = '🧪 测试发送';
      testBtn.disabled = false;
    });
    // Close
    document.getElementById('alertConfigClose').addEventListener('click', () => {
      modal.style.display = 'none';
    });
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.style.display = 'none';
    });
  }

  setupAlertHistory() {
    const modal = document.getElementById('alertHistoryModal');
    const list = document.getElementById('alertHistoryList');
    // Open modal
    document.getElementById('alertHistoryBtn').addEventListener('click', () => {
      AlertManager.renderHistory();
      modal.style.display = 'flex';
    });
    // Close
    document.getElementById('alertHistoryClose').addEventListener('click', () => {
      modal.style.display = 'none';
    });
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.style.display = 'none';
    });
    // Active alerts panel toggle
    const alertsHeader = document.getElementById('alertsHeader');
    const alertsPanel = document.getElementById('activeAlertsPanel');
    const alertsToggle = alertsPanel.querySelector('.alerts-toggle');
    if (alertsHeader) {
      alertsHeader.addEventListener('click', () => {
        alertsPanel.classList.toggle('collapsed');
        alertsToggle.textContent = alertsPanel.classList.contains('collapsed') ? '+' : '−';
      });
    }
    // Clear history
    document.getElementById('alertHistoryClear').addEventListener('click', () => {
      STATE.alertHistory = [];
      AlertManager._saveHistory();
      AlertManager.renderHistory();
    });
  }

  async manualRefresh() {
    const btn = document.getElementById('manualRefreshBtn');
    if (btn.classList.contains('refreshing')) return;
    btn.classList.add('refreshing');
    btn.textContent = '⏳ 刷新中...';
    document.getElementById('statData').textContent = '刷新中...';
    document.getElementById('statData').style.color = 'var(--yellow)';

    try {
      const freshPairs = await BinanceAPI.getTopPairs(CONFIG.TOP_COINS);
      let symbolsChanged = false;

      // Update prices for existing panels
      for (const pair of freshPairs) {
        const panel = STATE.chartPanels[pair.symbol];
        if (panel) {
          panel.pairData = pair;
          panel.updatePrice(pair.lastPrice, pair.priceChangePercent);
        }
      }

      // Check for new pairs that entered top 50
      const existingSymbols = new Set(Object.keys(STATE.chartPanels));
      for (const pair of freshPairs) {
        if (!existingSymbols.has(pair.symbol) && !STATE.removedPairs.has(pair.symbol)) {
          if (Object.keys(STATE.chartPanels).length < CONFIG.TOP_COINS) {
            await this.addPanel(pair);
            symbolsChanged = true;
          }
        }
      }

      // Remove pairs dropped from top 50 (if we have too many)
      if (Object.keys(STATE.chartPanels).length > CONFIG.TOP_COINS) {
        const freshSymbols = new Set(freshPairs.map(p => p.symbol));
        const toRemove = [];
        for (const sym of Object.keys(STATE.chartPanels)) {
          if (!freshSymbols.has(sym)) toRemove.push(sym);
        }
        const removeCount = Object.keys(STATE.chartPanels).length - CONFIG.TOP_COINS;
        for (let i = 0; i < Math.min(removeCount, toRemove.length); i++) {
          const panel = STATE.chartPanels[toRemove[i]];
          if (panel) panel.destroy();
          delete STATE.chartPanels[toRemove[i]];
          symbolsChanged = true;
        }
      }

      document.getElementById('pairCount').textContent =
        `币种: ${Object.keys(STATE.chartPanels).length}/${CONFIG.TOP_COINS}`;
      this.updateStats();

      // Auto-remove problematic panels
      this.autoRemoveProblematic();

      // Reconnect WebSocket if symbols changed
      if (symbolsChanged) {
        this.connectAllWS();
      }

      STATE.lastRefresh = Date.now();
      document.getElementById('statData').textContent = '✓ 刷新完成';
      document.getElementById('statData').style.color = 'var(--green)';
    } catch (e) {
      console.error('Manual refresh error:', e);
      document.getElementById('statData').textContent = '✗ 刷新失败';
      document.getElementById('statData').style.color = 'var(--red)';
    } finally {
      btn.classList.remove('refreshing');
      btn.textContent = '🔄 刷新';
    }
  }

  autoRemoveProblematic() {
    let removed = 0;
    const maxRemove = 3; // Max auto-removals per cycle
    for (const [symbol, panel] of Object.entries(STATE.chartPanels)) {
      if (removed >= maxRemove) break;
      if (!panel.dataValid && panel.candles.length > 0) {
        console.log(`Auto-removing problematic pair: ${symbol} (${panel.dataIssue})`);
        panel.destroy();
        delete STATE.chartPanels[symbol];
        STATE.removedPairs.add(symbol);
        removed++;
      }
    }
    if (removed > 0) this.fillMissingPairs();
  }

  // Periodic full Chan Theory recalculation, spread across frames
  updateStats() {
    const panels = Object.values(STATE.chartPanels);
    let upCount = 0, downCount = 0;

    for (const panel of panels) {
      if (panel.pairData) {
        if (panel.pairData.priceChangePercent >= 0) upCount++;
        else downCount++;
      }
    }

    document.getElementById('statUp').textContent = upCount;
    document.getElementById('statDown').textContent = downCount;
  }

  startClock() {
    const updateClock = () => {
      const now = new Date();
      // 显示北京时间 (UTC+8)
      const bjTime = new Date(now.getTime() + (8 * 60 * 60 * 1000) + now.getTimezoneOffset() * 60 * 1000);
      const days = ['日', '一', '二', '三', '四', '五', '六'];
      const str = bjTime.getUTCFullYear() + '-' +
        String(bjTime.getUTCMonth() + 1).padStart(2, '0') + '-' +
        String(bjTime.getUTCDate()).padStart(2, '0') + ' ' +
        '周' + days[bjTime.getUTCDay()] + ' ' +
        String(bjTime.getUTCHours()).padStart(2, '0') + ':' +
        String(bjTime.getUTCMinutes()).padStart(2, '0') + ':' +
        String(bjTime.getUTCSeconds()).padStart(2, '0') + ' BJT';
      document.getElementById('clock').textContent = str;
    };
    updateClock();
    STATE.clockTimer = setInterval(updateClock, 1000);
  }
}

// ==================== HELPER FUNCTIONS ====================
function updateConnectionStatus() {
  const dot = document.getElementById('connectionDot');
  if (STATE.wsConnected) {
    dot.className = '';
    dot.style.background = 'var(--green)';
    dot.title = 'WebSocket 已连接';
  } else {
    dot.className = 'disconnected';
    dot.style.background = 'var(--red)';
    dot.title = 'WebSocket 已断开';
  }
}

// ==================== BOOTSTRAP ====================
const dashboard = new Dashboard();

// Wait for lightweight-charts to load
function waitForLibrary(retries = 30) {
  if (typeof LightweightCharts !== 'undefined') {
    dashboard.init();
    return;
  }
  if (retries > 0) {
    setTimeout(() => waitForLibrary(retries - 1), 500);
  } else {
    document.getElementById('statData').textContent = '✗ 图表库加载超时，请刷新页面';
    document.getElementById('statData').style.color = 'var(--red)';
    console.error('LightweightCharts library failed to load');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  waitForLibrary();
});

// Handle window resize
let resizeDebounce;
window.addEventListener('resize', () => {
  clearTimeout(resizeDebounce);
  resizeDebounce = setTimeout(() => {
    for (const panel of Object.values(STATE.chartPanels)) {
      if (panel.chart) panel.chart.resize();
    }
  }, 200);
});

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// PWA install
let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = '';
});

installBtn.addEventListener('click', () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then((result) => {
    if (result.outcome === 'accepted') {
      installBtn.style.display = 'none';
      deferredPrompt = null;
    }
  });
});

window.addEventListener('appinstalled', () => {
  installBtn.style.display = 'none';
  deferredPrompt = null;
});
</script>
